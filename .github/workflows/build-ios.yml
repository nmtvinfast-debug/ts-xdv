name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'TS-appV1/**'
      - '.github/workflows/build-ios.yml'

jobs:
  ios:
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: TS-appV1
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate app icons (Node — không cần Pillow)
        run: |
          node scripts/generate_ios_icons.mjs
          ls -la ios/Runner/Assets.xcassets/AppIcon.appiconset/

      - name: CocoaPods install
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA (no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ts-xdv-ios-ipa
          path: TS-appV1/build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        if: success()
        run: |
          echo "## iOS build OK" >> $GITHUB_STEP_SUMMARY
          echo "Tải **Artifacts → ts-xdv-ios-ipa** trên trang run này." >> $GITHUB_STEP_SUMMARY
          echo "Lưu ý: IPA --no-codesign không cài thẳng lên iPhone; KH dùng Web hoặc TestFlight sau khi ký Apple." >> $GITHUB_STEP_SUMMARY
