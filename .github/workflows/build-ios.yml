name: Build iOS

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'TS-appV1/**'
      - '.github/workflows/build-ios.yml'

jobs:
  ios:
    runs-on: macos-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: TS-appV1
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare iOS project (Pods + Xcode)
        run: |
          chmod +x scripts/ios_ci_prepare.sh
          bash scripts/ios_ci_prepare.sh

      - name: Build IPA (no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ts-xdv-ios-ipa
          path: TS-appV1/build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        if: success()
        run: |
          echo "## iOS build OK" >> $GITHUB_STEP_SUMMARY
          echo "Tải **Artifacts → ts-xdv-ios-ipa** trên trang run này." >> $GITHUB_STEP_SUMMARY
          echo "IPA chưa ký Apple **không cài** trực tiếp lên iPhone khách. KH iPhone: dùng Web https://ts-server.fly.dev/releases/web/" >> $GITHUB_STEP_SUMMARY
